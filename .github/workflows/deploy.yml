name: Deploy (Convex + Vercel)

# Runs on every push to main — regardless of who authored the commit.
# This sidesteps Vercel's Hobby-tier rule where only the account owner's
# commits trigger a deploy. The job deploys the Convex backend, then builds
# and ships the frontend to Vercel via the Vercel CLI using a token.
on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 1) Deploy Convex functions + schema to the PRODUCTION deployment.
      #    Uses CONVEX_DEPLOY_KEY (a Convex *production* deploy key).
      - name: Deploy Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex deploy -y

      # 2) Build the frontend pointed at the prod Convex URL, then push to Vercel.
      #    VITE_CONVEX_URL is your prod deployment's .cloud URL.
      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
